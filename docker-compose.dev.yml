services:
  rag_backend:
    command: sh -c "npm install && npm run dev"
    environment:
      - RAG_FEEDER_PYTHON=/opt/venv/bin/python
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - RAG_FEEDER_LOG_DIR=/usr/src/app/logs
      - CHOKIDAR_USEPOLLING=1
    volumes:
      - ./backend:/usr/src/app
      - rag_backend_node_modules:/usr/src/app/node_modules
      - ./dl_lit:/usr/src/app/dl_lit
      - ./dl_lit_project:/usr/src/app/dl_lit_project
      - rag_feeder_uploads:/usr/src/app/uploads
      - rag_feeder_logs:/usr/src/app/logs

  rag_feeder:
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5175 --strictPort"
    environment:
      - NODE_ENV=development
      - NPM_CONFIG_PRODUCTION=false
      - CHOKIDAR_USEPOLLING=1
      - VITE_DEV_PROXY_TARGET=http://rag_backend:4000
      - VITE_HMR_HOST=genkia.de
      - VITE_HMR_PROTOCOL=wss
      - VITE_HMR_CLIENT_PORT=443
    volumes:
      - ./frontend:/app
      - rag_feeder_node_modules:/app/node_modules

volumes:
  rag_backend_node_modules:
  rag_feeder_node_modules:
  rag_feeder_logs:
